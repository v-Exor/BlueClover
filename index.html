<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueClover OS - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <!-- Boot Screen -->
  <div id="bootScreen" class="boot-screen">
    <div class="boot-logo">⬢</div>
    <h1>BlueClover OS</h1>
    <div class="loader"></div>
    <p>Booting system...</p>
  </div>

  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen hidden">
    <div class="login-card fade-in-up">
      <div class="user-avatar">👤</div>
      <h2>Welcome Back</h2>
      <p>Sign in to continue to BlueClover OS</p>

      <div id="loginError" class="error-box hidden">Invalid username or password.</div>

      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>

      <div class="login-hint">
        Demo Account: <strong>admin</strong> / <strong>1234</strong>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
